build:
  gpu: true
  cuda: "12.1"
  python_version: "3.10"
  system_packages:
    - "ffmpeg"
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
    - "libsndfile1"
    - "libsndfile1-dev"
    - "git"
  python_packages:
    - "torch==2.4.1"
    - "torchvision==0.19.1"
    - "torchaudio==2.4.1"
    - "ninja"
    - "psutil"
    - "packaging"
    - "wheel"
    - "setuptools"
    - "einops"
    - "xformers==0.0.28"
    - "diffusers==0.31.0"
    - "transformers==4.49.0"
    - "accelerate"
    - "huggingface_hub"
    - "opencv-python-headless"
    - "httpx"
    - "librosa"
    - "soundfile"
    - "PySoundFile"
    - "imageio"
    - "easydict"
    - "ftfy"
    - "imageio-ffmpeg"
    - "scikit-image"
    - "loguru"
    - "pyloudnorm"
    - "optimum-quanto==0.2.6"
    - "scenedetect"
    - "moviepy==1.0.3"
    - "decord"
    - "dashscope"
  run:
    # flash-attn must compile after torch is installed
    - "pip install flash-attn==2.6.3 --no-build-isolation"
    # xfuser without deps (distvae/yunchang are optional & cause cascading issues)
    - "pip install xfuser==0.4.1 --no-deps"
    - "pip install distvae --no-deps"
    # Patch xfuser to use lazy imports — avoids needing yunchang at import time
    # InfiniteTalk only needs xfuser.core.distributed, not the full xfuser package
    - "python3 -c \"import subprocess,pathlib;loc=[l for l in subprocess.check_output(['pip','show','xfuser']).decode().splitlines() if l.startswith('Location:')][0].split(': ')[1];base=pathlib.Path(loc)/'xfuser';(base/'__init__.py').write_text('# lazy\\n');(base/'core'/'__init__.py').write_text('# lazy\\n');print('xfuser patched')\""
    # force-reinstall pinned versions last — xfuser overwrites them
    - "pip install --force-reinstall diffusers==0.31.0 transformers==4.49.0"
    # clone InfiniteTalk repo into image
    - "git clone https://github.com/MeiGen-AI/InfiniteTalk.git /src/InfiniteTalk"
    # Patch: comment out kokoro/TTS import — we provide audio externally
    # Using Python for reliability (sed+YAML quoting is fragile)
    - "python3 -c \"p='/src/InfiniteTalk/generate_infinitetalk.py';lines=open(p).readlines();f=open(p,'w');[f.write('# '+l if 'kokoro' in l and 'import' in l else l) for l in lines];f.close();print('kokoro import patched')\""
    # Remove misaki/spacy if somehow installed (pydantic v1/v2 conflict)
    - "pip uninstall -y misaki spacy 2>/dev/null; echo done"
    # patch diffusers 0.31.0: add back no_init_weights + ContextManagers
    # (removed in 0.31.0 but InfiniteTalk's wan/multitalk.py imports them)
    - "python3 -c \"import base64,diffusers.models.modeling_utils as mu;p=mu.__file__;c=open(p).read();patch=base64.b64decode('').decode();open(p,'a').write(patch) if 'no_init_weights' not in c else None;print('Patched' if 'no_init_weights' not in c else 'Already patched')\""

predict: "predict.py:Predictor"
