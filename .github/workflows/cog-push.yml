name: Cog Push (InfiniteTalk LipSync)

on:
  push:
    branches: [runpod-handlers]
    paths:
      - "runpod/infinitetalk/replicate/**"
  workflow_dispatch:

jobs:
  cog-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Setup Cog
        uses: replicate/setup-cog@v2
        with:
          token: ${{ secrets.REPLICATE_API_TOKEN }}

      - name: Build & push (with retry)
        working-directory: runpod/infinitetalk/replicate
        run: |
          for attempt in 1 2 3; do
            echo "=== Push attempt $attempt ==="
            if cog push r8.im/info-hash12/noir-factory-lipsync; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt, waiting 30s..."
            sleep 30
          done
          echo "All push attempts failed"
          exit 1
